apiVersion: v1
kind: Service
metadata:
  name: donation-system-service
  namespace: production
  labels:
    app: donation-system
spec:
  type: LoadBalancer
  selector:
    app: donation-system
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080

---
# ─── Namespace for Staging ───────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: staging

---
# ─── Namespace for Production ────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: production

---
# ─── Secret template (fill with real values) ─────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: donation-db-secret
  namespace: production
type: Opaque
stringData:
  datasource-url: "jdbc:postgresql://your-db-host:5432/donationdb"
  datasource-username: "donationuser"
  datasource-password: "your-secure-password"
